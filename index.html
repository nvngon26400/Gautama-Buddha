<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var th = localStorage.getItem('gautama-theme')
          if (th === 'light' || th === 'dark') {
            document.documentElement.setAttribute('data-theme', th)
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark')
          }
          var loc = localStorage.getItem('gautama-locale')
          if (loc === 'en' || loc === 'vi') document.documentElement.lang = loc
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta http-equiv="Permissions-Policy" content="camera=(self)" />
    <meta name="theme-color" content="#2a2420" />
    <meta name="description" content="Nhận diện tượng Phật/Bồ Tát — thủ ấn, pháp khí và chánh niệm." />
    <!-- Không tải font ngoài để giảm critical requests và tăng điểm Lighthouse mobile -->
    <title>Nhận diện biểu tượng Phật giáo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
